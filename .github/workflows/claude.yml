name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check authorization
        id: check_auth
        run: |
          AUTHOR_ASSOCIATION=""
          if [ "${{ github.event_name }}" = "issue_comment" ] || [ "${{ github.event_name }}" = "pull_request_review_comment" ]; then
            AUTHOR_ASSOCIATION="${{ github.event.comment.author_association }}"
          elif [ "${{ github.event_name }}" = "pull_request_review" ]; then
            AUTHOR_ASSOCIATION="${{ github.event.review.author_association }}"
          elif [ "${{ github.event_name }}" = "issues" ]; then
            AUTHOR_ASSOCIATION="${{ github.event.issue.author_association }}"
          fi
          
          if [[ "$AUTHOR_ASSOCIATION" != "OWNER" && "$AUTHOR_ASSOCIATION" != "MEMBER" && "$AUTHOR_ASSOCIATION" != "COLLABORATOR" ]]; then
            echo "Unauthorized: author_association is $AUTHOR_ASSOCIATION"
            exit 1
          fi
          echo "Authorized: $AUTHOR_ASSOCIATION"

      - name: Run Claude Code
        id: claude
        if: success()
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Security: Restrict Claude capabilities to prevent prompt injection
          claude_args: '--allowed-tools Bash(gh pr *) --allowed-tools Git(*)'

