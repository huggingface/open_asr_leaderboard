name: Soniox multilingual benchmark
run-name: Soniox multilingual (max samples ${{ inputs.max_samples || 'all' }})

on:
  workflow_dispatch:
    inputs:
      max_samples:
        description: "Samples per dataset (leave empty for the full benchmark)"
        required: false
        type: string
      max_workers:
        description: "Local worker queue size"
        required: true
        default: "20"
        type: string
      file_requests_per_minute:
        description: "Soniox file-management RPM"
        required: true
        default: "240"
        type: string
      transcription_requests_per_minute:
        description: "Soniox async-transcription RPM"
        required: true
        default: "240"
        type: string
      seed_run_id:
        description: "Prior one-sample smoke run ID to reuse (optional)"
        required: false
        type: string
      result_run_id:
        description: "Prior run ID to score without transcribing (optional)"
        required: false
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: soniox-multilingual-${{ github.repository }}
  cancel-in-progress: false

jobs:
  transcribe:
    name: ${{ matrix.config }}
    if: inputs.result_run_id == ''
    runs-on: ubuntu-latest
    timeout-minutes: 355
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - config: fleurs_de
            language: de
          - config: fleurs_fr
            language: fr
          - config: fleurs_it
            language: it
          - config: fleurs_es
            language: es
          - config: fleurs_pt
            language: pt
          - config: mcv_de
            language: de
          - config: mcv_es
            language: es
          - config: mcv_fr
            language: fr
          - config: mcv_it
            language: it
          - config: mls_es
            language: es
          - config: mls_fr
            language: fr
          - config: mls_it
            language: it
          - config: mls_pt
            language: pt
    env:
      SONIOX_API_KEY: ${{ secrets.SONIOX_API_KEY }}
      SONIOX_FILE_REQUESTS_PER_MINUTE: ${{ inputs.file_requests_per_minute }}
      SONIOX_TRANSCRIPTION_REQUESTS_PER_MINUTE: ${{ inputs.transcription_requests_per_minute }}
      HF_AUDIO_DECODER_BACKEND: soundfile
      MAX_SAMPLES: ${{ inputs.max_samples }}
      MAX_WORKERS: ${{ inputs.max_workers }}
      SEED_RUN_ID: ${{ inputs.seed_run_id }}
    steps:
      - name: Check out benchmark code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/action-requirements.txt

      - name: Install system audio dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends libsndfile1 ffmpeg

      - name: Install evaluation dependencies
        run: python -m pip install --disable-pip-version-check -r api/action-requirements.txt

      - name: Download paid smoke result
        if: inputs.seed_run_id != ''
        uses: actions/download-artifact@v4
        with:
          name: soniox-1-${{ matrix.config }}
          path: api/seed-results
          repository: ${{ github.repository }}
          run-id: ${{ inputs.seed_run_id }}
          github-token: ${{ github.token }}

      - name: Validate inputs and secret
        shell: bash
        run: |
          [[ -n "$SONIOX_API_KEY" ]] || {
            echo "SONIOX_API_KEY repository secret is not configured." >&2
            exit 1
          }
          [[ "$MAX_WORKERS" =~ ^[1-9][0-9]*$ ]] || {
            echo "max_workers must be a positive integer." >&2
            exit 1
          }
          [[ "$SONIOX_FILE_REQUESTS_PER_MINUTE" =~ ^[1-9][0-9]*$ ]] || {
            echo "file_requests_per_minute must be a positive integer." >&2
            exit 1
          }
          [[ "$SONIOX_TRANSCRIPTION_REQUESTS_PER_MINUTE" =~ ^[1-9][0-9]*$ ]] || {
            echo "transcription_requests_per_minute must be a positive integer." >&2
            exit 1
          }
          if [[ -n "$MAX_SAMPLES" && ! "$MAX_SAMPLES" =~ ^[1-9][0-9]*$ ]]; then
            echo "max_samples must be empty or a positive integer." >&2
            exit 1
          fi
          if [[ -n "$SEED_RUN_ID" && ! "$SEED_RUN_ID" =~ ^[1-9][0-9]*$ ]]; then
            echo "seed_run_id must be empty or a positive integer." >&2
            exit 1
          fi

      - name: Evaluate Soniox Async
        working-directory: api
        shell: bash
        run: |
          args=(
            --dataset_path nithinraok/asr-leaderboard-datasets
            --config_name "${{ matrix.config }}"
            --language "${{ matrix.language }}"
            --split test
            --model_name soniox/stt-async-v5
            --max_workers "$MAX_WORKERS"
            --resume
          )
          if [[ -n "$MAX_SAMPLES" ]]; then
            args+=(--max_samples "$MAX_SAMPLES")
          fi
          if [[ -n "$SEED_RUN_ID" ]]; then
            args+=(
              --seed_manifest
              "$GITHUB_WORKSPACE/api/seed-results/MODEL_soniox-stt-async-v5_DATASET_nithinraok-asr-leaderboard-datasets_${{ matrix.config }}_test.jsonl"
            )
          fi
          python run_eval_ml.py "${args[@]}"

      - name: Upload result manifest
        uses: actions/upload-artifact@v4
        with:
          name: soniox-${{ github.run_attempt }}-${{ matrix.config }}
          path: api/results/MODEL_soniox-stt-async-v5_DATASET_nithinraok-asr-leaderboard-datasets_${{ matrix.config }}_test.jsonl
          if-no-files-found: error
          retention-days: 30

      - name: Preserve checkpoint after failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: soniox-checkpoint-${{ github.run_attempt }}-${{ matrix.config }}
          path: api/results/.checkpoints/*.jsonl.partial
          if-no-files-found: ignore
          retention-days: 7

  score:
    name: Score multilingual results
    needs: transcribe
    if: >-
      always() &&
      (needs.transcribe.result == 'success' || inputs.result_run_id != '')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: write
    steps:
      - name: Check out benchmark code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/action-requirements.txt

      - name: Install scoring dependencies
        run: |
          python -m pip install --disable-pip-version-check \
            datasets==2.19.0 jiwer num2words regex kaldialign==0.12.0

      - name: Download current result manifests
        if: inputs.result_run_id == ''
        uses: actions/download-artifact@v4
        with:
          pattern: soniox-${{ github.run_attempt }}-*
          path: api/results
          merge-multiple: true

      - name: Download prior result manifests
        if: inputs.result_run_id != ''
        uses: actions/download-artifact@v4
        with:
          pattern: soniox-1-*
          path: api/results
          merge-multiple: true
          repository: ${{ github.repository }}
          run-id: ${{ inputs.result_run_id }}
          github-token: ${{ github.token }}

      - name: Score and publish summary
        working-directory: api
        shell: bash
        run: |
          python score_multilingual_results.py \
            --results-dir "$PWD/results" \
            --model-id soniox/stt-async-v5 \
            --dataset-path nithinraok/asr-leaderboard-datasets \
            | tee soniox-multilingual-scores.txt
          {
            echo '## Soniox multilingual benchmark'
            echo
            echo '```csv'
            tail -n 2 soniox-multilingual-scores.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload score summary
        uses: actions/upload-artifact@v4
        with:
          name: soniox-multilingual-summary-${{ github.run_attempt }}
          path: api/soniox-multilingual-scores.txt
          if-no-files-found: error
          retention-days: 30

      - name: Update full leaderboard row
        if: inputs.max_samples == '' && inputs.result_run_id == ''
        run: |
          python api/update_multilingual_csv.py \
            --csv-path scripts/data/multilingual.csv \
            --scores-path api/soniox-multilingual-scores.txt \
            --model-id soniox/stt-async-v5

      - name: Commit full leaderboard row
        if: inputs.max_samples == '' && inputs.result_run_id == ''
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/data/multilingual.csv
          if git diff --cached --quiet; then
            echo "Leaderboard row is already current."
          else
            git commit -m "Add Soniox multilingual benchmark results"
            git push origin "HEAD:$GITHUB_REF_NAME"
          fi
