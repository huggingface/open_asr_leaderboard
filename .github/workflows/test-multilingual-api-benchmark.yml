name: Test multilingual API benchmark

on:
  pull_request:
    paths:
      - ".github/workflows/multilingual-api-benchmark.yml"
      - ".github/workflows/test-multilingual-api-benchmark.yml"
      - "api/action-requirements.txt"
      - "api/multilingual_benchmark.py"
      - "api/providers/**"
      - "api/run_eval_ml.py"
      - "normalizer/**"
      - "tests/test_multilingual_benchmark.py"
      - "tests/test_run_eval_ml_resume.py"
  push:
    branches: [main]
    paths:
      - ".github/workflows/multilingual-api-benchmark.yml"
      - ".github/workflows/test-multilingual-api-benchmark.yml"
      - "api/action-requirements.txt"
      - "api/multilingual_benchmark.py"
      - "api/providers/**"
      - "api/run_eval_ml.py"
      - "normalizer/**"
      - "tests/test_multilingual_benchmark.py"
      - "tests/test_run_eval_ml_resume.py"

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/action-requirements.txt
      - run: python -m pip install --disable-pip-version-check -r api/action-requirements.txt
      - run: python -m unittest discover -s tests -v
